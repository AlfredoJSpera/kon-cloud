services:
    mssql:
        image: mcr.microsoft.com/mssql/server:2025-latest
        container_name: mssql_server
        ports:
            - "1433:1433"
        environment:
            - ACCEPT_EULA=Y
            - MSSQL_SA_PASSWORD=${DB_PASSWORD}
            - MSSQL_PID=Developer
        restart: unless-stopped
        volumes:
            - mssql_data:/var/opt/mssql

volumes:
    mssql_data:
        driver: local
